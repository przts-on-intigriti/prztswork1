# fly.toml app configuration file generated for fsc-open-webui on 2026-05-19T20:20:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fsc-open-webui'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
